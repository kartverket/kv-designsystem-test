name: Publish Packages

# Trigger only after the Build workflow completes successfully
on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

permissions:
  contents: read
  packages: write  # Needed to publish to npm
  id-token: write  # Required if using OIDC login to npm

jobs:
  setup:
    uses: ./.github/workflows/setup.yml

  publish:
    needs: setup
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      # Authenticate with npm
      - name: Set up npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

 # Publish @kv-design/react
      - name: Publish @kv-design/react
        working-directory: packages/react
        run: |
          echo "Setting version to 0.0.0-test for publishing"
          pnpm pkg set version 0.0.0-test
          pnpm publish --access public --tag test

      # Publish @kv-design/css
      - name: Publish @kv-design/css
        working-directory: packages/css
        run: |
          echo "Setting version to 0.0.0-test for publishing"
          pnpm pkg set version 0.0.0-test
          pnpm publish --access public --tag test
