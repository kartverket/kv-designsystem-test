name: Setup pnpm + Node + Nx
description: Install dependencies and prepare Nx SHAs

inputs:
  ref:
    description: Git ref to checkout
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ inputs.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: package.json
        cache: pnpm
        registry-url: https://registry.npmjs.org
        scope: '@kv-designsystem'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Set Nx SHAs
      uses: nrwl/nx-set-shas@v4
      with:
        main-branch-name: main